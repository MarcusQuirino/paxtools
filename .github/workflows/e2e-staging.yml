# Unified e2e suite against the STAGING environment (PRD #58).
#
# Manual trigger only (`gh workflow run e2e-staging.yml`) — deliberately not
# wired to staging deploys until the suite proves stable. The run reseeds
# staging before and after (global setup/teardown), so a manual poking
# session in progress will lose its data — trigger consciously.
name: E2E (staging)

on:
  workflow_dispatch:

concurrency:
  group: e2e-staging
  cancel-in-progress: false

jobs:
  e2e:
    name: Playwright vs staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # The staging deploy key pins every `bunx convex run` to the staging
      # deployment (the CLI wrapper skips `--deployment` when a key is set).
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_STAGING }}
      # Shared test-login password. The fallback matches the repo-wide default
      # (playwright.config.ts, .env.local) and staging's TEST_AUTH_PASSWORD;
      # set the TEST_AUTH_PASSWORD repo secret only if staging ever rotates it.
      TEST_AUTH_PASSWORD: ${{ secrets.TEST_AUTH_PASSWORD || 'paxtools-test-only' }}
      E2E_TARGET: staging
      TEST_AUTH: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run e2e suite against staging
        run: bunx playwright test

      - name: Upload traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
